version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iwel_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks:
      - iwel-network

  web:
    image: nginx:stable-alpine
    container_name: iwel_web
    restart: unless-stopped
    ports:
      - "9900:80"
    volumes:
      - ./public:/var/www/html/public:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_started
    networks:
      - iwel-network

  db:
    image: mysql:8.0
    container_name: iwel_db
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - iwel-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "$DB_USERNAME", "-p$DB_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  dbdata:
    driver: local

networks:
  iwel-network:
    driver: bridge