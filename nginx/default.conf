server {
    listen 80;
    server_name _;

    # Document root points to Laravel's public directory
    root /var/www/html/public;

    # Allow Nginx to follow symlinks (required for storage:link)
    disable_symlinks off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    index index.php;
    charset utf-8;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Main request handling – forward to Laravel front controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP processing via the app (PHP-FPM) container
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_intercept_errors on;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_read_timeout 120;
    }

    # Serve uploaded files via Laravel storage symlink
    location ^~ /storage/ {
        alias /var/www/html/public/storage/;
        disable_symlinks off;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000";
    }

    # Serve static assets directly with caching headers
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        disable_symlinks off;
        try_files $uri =404;
    }

    # Deny access to hidden files (e.g., .htaccess, .env)
    location ~ /\.(?!well-known).* {
        deny all;
        return 404;
    }
}